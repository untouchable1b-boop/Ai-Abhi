<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai ABHI - Future Chat</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: sans-serif; background-color: #050505;
            color: white; overflow: hidden;
        }
        #welcome-screen {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; text-align: center;
            background: radial-gradient(circle, #111 0%, #000 100%);
        }
        .neon-text {
            font-size: 3.5rem; font-weight: bold;
            text-transform: uppercase; letter-spacing: 5px;
            margin-bottom: 30px; color: #fff;
            animation: neon-glow 1.5s ease-in-out infinite alternate;
        }
        @keyframes neon-glow {
            from { text-shadow: 0 0 10px #fff, 0 0 20px #00d2ff, 0 0 30px #00d2ff; }
            to   { text-shadow: 0 0 20px #fff, 0 0 40px #ff00de, 0 0 60px #ff00de; }
        }
        .continue-btn {
            padding: 15px 40px; font-size: 1.2rem; cursor: pointer;
            background: transparent; border: 2px solid #ff00de;
            color: white; border-radius: 30px;
            box-shadow: 0 0 15px #ff00de; transition: box-shadow 0.3s;
        }
        .continue-btn:hover { box-shadow: 0 0 40px #ff00de; }

        #setup-screen {
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; padding: 30px; text-align: center;
            background: radial-gradient(circle, #111 0%, #000 100%);
        }
        #setup-screen h2 { color: #00d2ff; font-size: 1.5rem; margin-bottom: 8px; }
        #setup-screen p { color: #888; font-size: 0.88rem; margin-bottom: 25px; line-height: 1.6; }
        #api-key-input {
            width: 100%; max-width: 400px; padding: 13px 15px;
            border-radius: 12px; border: 1px solid #ff00de;
            background: #1a1a1a; color: white; font-size: 0.95rem;
            outline: none; margin-bottom: 10px;
        }
        .remember-row {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 20px; color: #aaa; font-size: 0.88rem;
        }
        .remember-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
        .setup-btn {
            padding: 13px 40px; font-size: 1rem; cursor: pointer;
            background: transparent; border: 2px solid #00d2ff;
            color: white; border-radius: 25px;
            box-shadow: 0 0 15px #00d2ff; transition: box-shadow 0.3s;
        }
        .setup-btn:hover { box-shadow: 0 0 35px #00d2ff; }

        #chat-screen {
            display: none; flex-direction: column; height: 100vh;
        }
        .chat-header {
            padding: 15px 18px; background: #111;
            border-bottom: 1px solid #222;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }
        .chat-header span {
            font-size: 1.3rem; color: #00d2ff;
            text-shadow: 0 0 10px #00d2ff; letter-spacing: 2px;
        }
        .logout-btn {
            position: absolute; right: 15px;
            background: transparent; border: 1px solid #444;
            color: #888; padding: 5px 10px; border-radius: 8px;
            cursor: pointer; font-size: 0.75rem;
        }
        .logout-btn:hover { border-color: #ff00de; color: #ff00de; }

        #chat-box {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column;
            gap: 14px; background: #0a0a0a;
        }
        .message {
            padding: 12px 18px; border-radius: 18px;
            max-width: 82%; line-height: 1.6;
            word-wrap: break-word; font-size: 0.97rem;
            white-space: pre-wrap;
        }
        .user-msg {
            align-self: flex-end;
            background: linear-gradient(135deg, #ff00de, #7000ff);
            color: white; border-radius: 18px 18px 4px 18px;
        }
        .bot-msg {
            align-self: flex-start; background: #1a1a1a;
            color: #00d2ff; border: 1px solid #2a2a2a;
            border-radius: 18px 18px 18px 4px;
        }
        .input-area {
            display: flex; padding: 14px 12px;
            background: #111; gap: 10px;
            border-top: 1px solid #222;
        }
        input#user-input {
            flex: 1; padding: 13px 15px;
            border: 1px solid #333; border-radius: 12px;
            background: #1a1a1a; color: white;
            outline: none; font-size: 1rem;
        }
        input#user-input:focus { border-color: #00d2ff; }
        .send-btn {
            background: linear-gradient(135deg, #00d2ff, #0080aa);
            border: none; padding: 0 22px; border-radius: 12px;
            font-weight: bold; cursor: pointer; color: #000;
            font-size: 0.95rem; transition: opacity 0.2s;
        }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .typing-indicator {
            display: flex; gap: 5px; align-items: center;
            padding: 14px 18px; background: #1a1a1a;
            border: 1px solid #2a2a2a; border-radius: 18px 18px 18px 4px;
            align-self: flex-start;
        }
        .typing-indicator span {
            width: 8px; height: 8px; background: #00d2ff;
            border-radius: 50%; animation: bounce 1.2s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>

<div id="welcome-screen">
    <h1 class="neon-text">Ai ABHI</h1>
    <button class="continue-btn" onclick="showSetup()">Continue</button>
</div>

<div id="setup-screen">
    <h2>🔑 Groq API Key Daalo</h2>
    <p>Apni Groq API key yahan daalo.<br>Yeh sirf aapke browser mein rehti hai.</p>
    <input type="password" id="api-key-input" placeholder="gsk_xxxxxxxxxxxxxxxxxxxx" />
    <div class="remember-row">
        <input type="checkbox" id="remember-key" checked>
        <label for="remember-key">Key yaad rakho (browser mein save karo)</label>
    </div>
    <button class="setup-btn" onclick="saveAndStart()">🚀 Start Chat</button>
</div>

<div id="chat-screen">
    <div class="chat-header">
        <span>⚡ Ai ABHI Assistant</span>
        <button class="logout-btn" onclick="changeKey()">🔑 Key Change</button>
    </div>
    <div id="chat-box">
        <div class="message bot-msg">Swagat hai! Main Ai ABHI hoon. Main aapki kya madad kar sakta hoon?</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Kuch puchiye..."
            onkeypress="if(event.key === 'Enter') sendMessage()">
        <button class="send-btn" id="send-btn" onclick="sendMessage()">SEND</button>
    </div>
</div>

<script>
    let GROQ_API_KEY = "";
    let conversationHistory = [];

    // On load — check if key already saved
    window.onload = function() {
        const saved = localStorage.getItem('groq_api_key');
        if (saved) {
            GROQ_API_KEY = saved;
            showChat();
        } else {
            document.getElementById('welcome-screen').style.display = 'flex';
        }
    };

    function showSetup() {
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('setup-screen').style.display = 'flex';
    }

    function saveAndStart() {
        const key = document.getElementById('api-key-input').value.trim();
        const remember = document.getElementById('remember-key').checked;

        if (!key || !key.startsWith('gsk_')) {
            alert('Valid Groq API key daalo! (gsk_ se shuru honi chahiye)');
            return;
        }

        GROQ_API_KEY = key;

        if (remember) {
            localStorage.setItem('groq_api_key', key);
        }

        showChat();
    }

    function showChat() {
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        setTimeout(() => document.getElementById('user-input').focus(), 100);
    }

    function changeKey() {
        localStorage.removeItem('groq_api_key');
        GROQ_API_KEY = "";
        conversationHistory = [];
        document.getElementById('chat-screen').style.display = 'none';
        document.getElementById('api-key-input').value = '';
        document.getElementById('setup-screen').style.display = 'flex';
    }

    async function sendMessage() {
        const input = document.getElementById("user-input");
        const btn = document.getElementById("send-btn");
        const userText = input.value.trim();
        if (!userText) return;

        appendMessage(userText, 'user-msg');
        input.value = "";
        btn.disabled = true;

        conversationHistory.push({ role: "user", content: userText });

        const typingDiv = document.createElement("div");
        typingDiv.className = "typing-indicator";
        typingDiv.id = "typing";
        typingDiv.innerHTML = "<span></span><span></span><span></span>";
        document.getElementById("chat-box").appendChild(typingDiv);
        scrollToBottom();

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: conversationHistory,
                    max_tokens: 1024
                })
            });

            const data = await response.json();
            removeTyping();

            if (data.error) {
                appendMessage("❌ API Error: " + data.error.message, 'bot-msg');
            } else {
                const botReply = data.choices[0].message.content;
                conversationHistory.push({ role: "assistant", content: botReply });
                appendMessage(botReply, 'bot-msg');
            }

        } catch (error) {
            removeTyping();
            appendMessage("❌ Failed to fetch. Internet check karo ya API key change karo.", 'bot-msg');
            console.error(error);
        }

        btn.disabled = false;
        input.focus();
    }

    function appendMessage(text, className) {
        const chatBox = document.getElementById("chat-box");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        scrollToBottom();
    }

    function removeTyping() {
        const t = document.getElementById("typing");
        if (t) t.remove();
    }

    function scrollToBottom() {
        const chatBox = document.getElementById("chat-box");
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
