<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai ABHI - Future Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00d2ff;
            --magenta: #ff00de;
            --purple: #7000ff;
            --dark: #080810;
            --card: #0f0f1a;
            --border: #1e1e30;
            --text: #c8d8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            font-family: 'Rajdhani', sans-serif;
            background: var(--dark);
            color: var(--text);
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 4px; }

        /* ══════════════ WELCOME SCREEN ══════════════ */
        #welcome-screen {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; text-align: center;
            background: radial-gradient(ellipse at 50% 40%, #0d0d2b 0%, #080810 70%);
            position: relative; overflow: hidden;
        }
        #welcome-screen::before {
            content: '';
            position: absolute; inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 39px,
                rgba(0,210,255,0.04) 40px
            ),
            repeating-linear-gradient(
                90deg, transparent, transparent 39px,
                rgba(0,210,255,0.04) 40px
            );
            pointer-events: none;
        }
        .logo-ring {
            width: 130px; height: 130px;
            border-radius: 50%;
            border: 2px solid transparent;
            background: linear-gradient(var(--dark), var(--dark)) padding-box,
                        conic-gradient(var(--cyan), var(--magenta), var(--purple), var(--cyan)) border-box;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 28px;
            animation: ring-spin 6s linear infinite;
        }
        @keyframes ring-spin {
            to { filter: hue-rotate(360deg); }
        }
        .logo-inner {
            font-family: 'Orbitron', monospace;
            font-size: 2rem; font-weight: 900;
            background: linear-gradient(135deg, var(--cyan), var(--magenta));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .welcome-title {
            font-family: 'Orbitron', monospace;
            font-size: 2.6rem; font-weight: 900;
            letter-spacing: 8px; margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 30%, var(--cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: title-glow 3s ease-in-out infinite alternate;
        }
        @keyframes title-glow {
            from { filter: drop-shadow(0 0 8px rgba(0,210,255,0.4)); }
            to   { filter: drop-shadow(0 0 20px rgba(255,0,222,0.6)); }
        }
        .welcome-sub {
            color: #556; font-size: 0.9rem;
            letter-spacing: 4px; text-transform: uppercase;
            margin-bottom: 50px;
        }
        .neon-btn {
            position: relative; padding: 14px 48px;
            font-family: 'Orbitron', monospace; font-size: 0.85rem;
            font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
            color: white; cursor: pointer;
            background: transparent;
            border: none; outline: none;
        }
        .neon-btn::before, .neon-btn::after {
            content: ''; position: absolute;
            inset: 0; border-radius: 4px;
        }
        .neon-btn::before {
            background: linear-gradient(135deg, var(--cyan), var(--magenta));
            padding: 1px;
            -webkit-mask: linear-gradient(#fff 0 0) content-box,
                          linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }
        .neon-btn::after {
            background: linear-gradient(135deg, rgba(0,210,255,0.08), rgba(255,0,222,0.08));
            z-index: -1;
        }
        .neon-btn:hover { box-shadow: 0 0 30px rgba(0,210,255,0.3), 0 0 60px rgba(255,0,222,0.2); }
        .neon-btn:active { transform: scale(0.97); }

        /* ══════════════ SETUP SCREEN ══════════════ */
        #setup-screen {
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; padding: 30px;
            background: radial-gradient(ellipse at 50% 40%, #0d0d2b 0%, #080810 70%);
        }
        .setup-card {
            width: 100%; max-width: 420px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px; padding: 36px 32px;
            box-shadow: 0 0 40px rgba(0,210,255,0.06);
        }
        .setup-card h2 {
            font-family: 'Orbitron', monospace;
            color: var(--cyan); font-size: 1.1rem;
            letter-spacing: 2px; margin-bottom: 8px;
        }
        .setup-card p {
            color: #556; font-size: 0.88rem;
            line-height: 1.7; margin-bottom: 28px;
        }
        .input-label {
            display: block; font-size: 0.8rem;
            letter-spacing: 2px; color: #778;
            text-transform: uppercase; margin-bottom: 8px;
        }
        .fancy-input {
            width: 100%; padding: 13px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px; color: white;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.95rem; outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            margin-bottom: 16px;
        }
        .fancy-input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 0 3px rgba(0,210,255,0.08);
        }
        .remember-row {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 28px; cursor: pointer;
        }
        .remember-row input[type="checkbox"] {
            appearance: none; width: 18px; height: 18px;
            border: 1px solid #334; border-radius: 4px;
            background: transparent; cursor: pointer;
            position: relative; flex-shrink: 0;
        }
        .remember-row input[type="checkbox"]:checked {
            background: var(--cyan); border-color: var(--cyan);
        }
        .remember-row input[type="checkbox"]:checked::after {
            content: '✓'; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #000; font-size: 12px; font-weight: bold;
        }
        .remember-row span { color: #889; font-size: 0.88rem; }
        .error-msg {
            color: #ff4466; font-size: 0.82rem;
            margin-top: -10px; margin-bottom: 14px;
            display: none; padding-left: 4px;
        }

        /* ══════════════ CHAT SCREEN ══════════════ */
        #chat-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .chat-header {
            flex-shrink: 0;
            padding: 14px 18px;
            background: rgba(8,8,16,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .header-left {
            display: flex; align-items: center; gap: 10px;
        }
        .header-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--cyan);
            box-shadow: 0 0 8px var(--cyan);
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        .header-title {
            font-family: 'Orbitron', monospace;
            font-size: 1rem; font-weight: 700;
            color: var(--cyan); letter-spacing: 2px;
        }
        .header-subtitle {
            font-size: 0.7rem; color: #445;
            letter-spacing: 1px; margin-left: 18px;
        }
        .change-key-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: #667; padding: 6px 14px;
            border-radius: 8px; cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.8rem; letter-spacing: 1px;
            transition: all 0.3s;
        }
        .change-key-btn:hover {
            border-color: var(--magenta); color: var(--magenta);
        }

        #chat-box {
            flex: 1;
            min-height: 0; /* ← KEY FIX: enables flex child to shrink & scroll */
            padding: 20px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--dark);
        }

        /* Date separator */
        .date-sep {
            text-align: center; color: #334;
            font-size: 0.72rem; letter-spacing: 2px;
            text-transform: uppercase; margin: 4px 0;
        }

        .message-row {
            display: flex; align-items: flex-end; gap: 8px;
        }
        .message-row.user { justify-content: flex-end; }
        .message-row.bot  { justify-content: flex-start; }

        .avatar {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; flex-shrink: 0; font-weight: 700;
        }
        .avatar.bot {
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            color: #000;
        }

        .bubble-wrap { max-width: 80%; display: flex; flex-direction: column; }
        .message-row.user .bubble-wrap { align-items: flex-end; }
        .message-row.bot  .bubble-wrap { align-items: flex-start; }

        .message {
            padding: 11px 16px;
            border-radius: 16px;
            line-height: 1.65;
            word-wrap: break-word;
            font-size: 0.96rem;
            white-space: pre-wrap;
            position: relative;
        }
        .user-msg {
            background: linear-gradient(135deg, #6a00e8, #cc00c0);
            color: #fff;
            border-radius: 16px 16px 4px 16px;
            box-shadow: 0 4px 20px rgba(112,0,255,0.3);
        }
        .bot-msg {
            background: var(--card);
            color: #c8d8f0;
            border: 1px solid var(--border);
            border-radius: 16px 16px 16px 4px;
        }
        .msg-time {
            font-size: 0.68rem; color: #445;
            margin-top: 4px; letter-spacing: 0.5px;
        }

        /* ── Typing indicator ── */
        .typing-bubble {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px 16px 16px 4px;
            padding: 14px 18px; display: flex; gap: 5px; align-items: center;
        }
        .typing-bubble span {
            width: 7px; height: 7px;
            background: var(--cyan); border-radius: 50%;
            animation: bounce 1.3s ease-in-out infinite;
        }
        .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
        .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
            30% { transform: translateY(-7px); opacity: 1; }
        }

        /* ── Input area ── */
        .input-area {
            flex-shrink: 0;
            display: flex; align-items: center;
            padding: 12px 14px; gap: 10px;
            background: rgba(8,8,16,0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
        }
        #user-input {
            flex: 1; padding: 12px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 12px; color: white;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem; outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            resize: none; max-height: 120px;
        }
        #user-input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 0 3px rgba(0,210,255,0.07);
        }
        #user-input::placeholder { color: #334; }
        .send-btn {
            width: 46px; height: 46px; border-radius: 12px;
            background: linear-gradient(135deg, var(--cyan), #0088bb);
            border: none; cursor: pointer; color: #000;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(0,210,255,0.25);
        }
        .send-btn:hover { box-shadow: 0 4px 24px rgba(0,210,255,0.5); transform: translateY(-1px); }
        .send-btn:active { transform: scale(0.94); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
        .send-btn svg { width: 20px; height: 20px; }

        /* ── Toast ── */
        #toast {
            position: fixed; bottom: 90px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1a1a2e; border: 1px solid var(--border);
            color: #aaa; padding: 10px 20px; border-radius: 10px;
            font-size: 0.85rem; letter-spacing: 0.5px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s, transform 0.3s; z-index: 999;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── Clear button ── */
        .clear-btn {
            background: transparent; border: none;
            color: #334; cursor: pointer; padding: 8px;
            border-radius: 8px; transition: color 0.2s;
            flex-shrink: 0;
        }
        .clear-btn:hover { color: #ff4466; }

        /* ── Fade-in animation for messages ── */
        @keyframes msg-in {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .message-row { animation: msg-in 0.25s ease forwards; }

        /* ── Character counter ── */
        .char-count {
            font-size: 0.72rem; color: #334;
            text-align: right; padding: 0 4px 2px;
            letter-spacing: 0.5px;
        }
        .char-count.warn { color: #ff8800; }
    </style>
</head>
<body>

<!-- ══ WELCOME ══ -->
<div id="welcome-screen">
    <div class="logo-ring">
        <span class="logo-inner">AI</span>
    </div>
    <h1 class="welcome-title">ABHI</h1>
    <p class="welcome-sub">Next Gen AI Assistant</p>
    <button class="neon-btn" onclick="showSetup()">CONTINUE →</button>
</div>

<!-- ══ SETUP ══ -->
<div id="setup-screen">
    <div class="setup-card">
        <h2>🔑 API KEY SETUP</h2>
        <p>Apni Groq API key daalo. Yeh sirf aapke browser mein save hoti hai, kahi aur nahi jaati.</p>

        <label class="input-label" for="api-key-input">Groq API Key</label>
        <input type="password" id="api-key-input" class="fancy-input"
               placeholder="gsk_xxxxxxxxxxxxxxxxxxxx"
               oninput="clearError()" />
        <div class="error-msg" id="key-error">❌ Valid Groq API key daalo (gsk_ se shuru ho)</div>

        <label class="remember-row">
            <input type="checkbox" id="remember-key" checked>
            <span>Key browser mein save karo</span>
        </label>

        <button class="neon-btn" style="width:100%; justify-content:center" onclick="saveAndStart()">
            🚀 CHAT SHURU KARO
        </button>
    </div>
</div>

<!-- ══ CHAT ══ -->
<div id="chat-screen">
    <div class="chat-header">
        <div class="header-left">
            <div class="header-dot"></div>
            <div>
                <div class="header-title">⚡ Ai ABHI</div>
                <div class="header-subtitle">POWERED BY GROQ · LLAMA 3.3</div>
            </div>
        </div>
        <button class="change-key-btn" onclick="changeKey()">🔑 Key Change</button>
    </div>

    <div id="chat-box">
        <!-- Welcome message injected via JS -->
    </div>

    <div class="input-area">
        <button class="clear-btn" title="Chat clear karo" onclick="clearChat()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14H6L5 6"/>
                <path d="M10 11v6M14 11v6"/>
            </svg>
        </button>
        <textarea id="user-input" rows="1" placeholder="Kuch puchiye..."
            oninput="autoResize(this); updateCharCount(this)"
            onkeydown="handleKeyDown(event)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>
</div>

<div id="toast"></div>

<script>
    let GROQ_API_KEY = "";
    let conversationHistory = [];
    const MAX_CHARS = 2000;

    // ── INIT ──
    window.onload = function () {
        const saved = localStorage.getItem('groq_api_key');
        if (saved) {
            GROQ_API_KEY = saved;
            showChat();
        }
    };

    // ── SCREENS ──
    function showSetup() {
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('setup-screen').style.display = 'flex';
        setTimeout(() => document.getElementById('api-key-input').focus(), 100);
    }

    function saveAndStart() {
        const key = document.getElementById('api-key-input').value.trim();
        const remember = document.getElementById('remember-key').checked;
        const errEl = document.getElementById('key-error');

        if (!key || !key.startsWith('gsk_')) {
            errEl.style.display = 'block';
            return;
        }

        GROQ_API_KEY = key;
        if (remember) localStorage.setItem('groq_api_key', key);
        showChat();
    }

    function clearError() {
        document.getElementById('key-error').style.display = 'none';
    }

    function showChat() {
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';

        const box = document.getElementById('chat-box');
        if (box.children.length === 0) {
            addBotMessage("Swagat hai! 👋 Main **Ai ABHI** hoon — aapka intelligent assistant, mere developer **ABHINAV RAJ** hain ❤️\n\nAap mujhse kuch bhi pooch sakte hain. Kaise madad karoon? 😊");
        }
        setTimeout(() => document.getElementById('user-input').focus(), 100);
    }

    function changeKey() {
        localStorage.removeItem('groq_api_key');
        GROQ_API_KEY = "";
        conversationHistory = [];
        document.getElementById('chat-box').innerHTML = '';
        document.getElementById('chat-screen').style.display = 'none';
        document.getElementById('api-key-input').value = '';
        document.getElementById('setup-screen').style.display = 'flex';
        setTimeout(() => document.getElementById('api-key-input').focus(), 100);
    }

    function clearChat() {
        conversationHistory = [];
        document.getElementById('chat-box').innerHTML = '';
        addBotMessage("Chat clear ho gayi! Naya conversation shuru karte hain. 🔄");
        showToast("Chat cleared");
    }

    // ── SEND ──
    async function sendMessage() {
        const input = document.getElementById("user-input");
        const btn = document.getElementById("send-btn");
        const userText = input.value.trim();
        if (!userText || btn.disabled) return;

        addUserMessage(userText);
        input.value = "";
        input.style.height = 'auto';
        updateCharCount(input);
        btn.disabled = true;

        conversationHistory.push({ role: "user", content: userText });

        const typingEl = addTypingIndicator();
        scrollToBottom();

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        {
                            role: "system",
                            content: "Aap Ai ABHI hain — ek friendly, helpful aur intelligent AI assistant jo ABHINAV RAJ ne banaya hai. Aapke liye kuch strict rules hain jo aapko hamesha follow karne hain:\n1. Hamesha sirf Hindi mein jawab do, chahe user kisi bhi language mein pooche. Sirf technical terms ya code English mein likh sakte ho.\n2. Hamesha emojis ka bharpoor istemal karo — har message mein relevant emojis zaroor use karo.\n3. Hamesha bahut polite, warm aur respectful language use karo. User ko 'aap' keh ke bulao.\n4. Kabhi bhi rude ya negative mat bano.\n5. Apna introduction dene par batao ki aapko ABHINAV RAJ ne banaya hai."
                        },
                        ...conversationHistory
                    ],
                    max_tokens: 1024,
                    temperature: 0.7
                })
            });

            const data = await response.json();
            typingEl.remove();

            if (data.error) {
                addBotMessage("❌ API Error: " + data.error.message);
            } else {
                const botReply = data.choices[0].message.content;
                conversationHistory.push({ role: "assistant", content: botReply });
                addBotMessage(botReply);
            }

        } catch (error) {
            typingEl.remove();
            addBotMessage("❌ Connection failed. Internet check karo ya API key verify karo.");
            console.error(error);
        }

        btn.disabled = false;
        input.focus();
    }

    // ── DOM HELPERS ──
    function getTime() {
        return new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
    }

    function addUserMessage(text) {
        const chatBox = document.getElementById("chat-box");
        const row = document.createElement("div");
        row.className = "message-row user";
        row.innerHTML = `
            <div class="bubble-wrap">
                <div class="message user-msg">${escapeHtml(text)}</div>
                <div class="msg-time">${getTime()}</div>
            </div>`;
        chatBox.appendChild(row);
        scrollToBottom();
    }

    function addBotMessage(text) {
        const chatBox = document.getElementById("chat-box");
        const row = document.createElement("div");
        row.className = "message-row bot";
        row.innerHTML = `
            <div class="avatar bot">AI</div>
            <div class="bubble-wrap">
                <div class="message bot-msg">${formatBotText(text)}</div>
                <div class="msg-time">${getTime()}</div>
            </div>`;
        chatBox.appendChild(row);
        scrollToBottom();
    }

    function addTypingIndicator() {
        const chatBox = document.getElementById("chat-box");
        const row = document.createElement("div");
        row.className = "message-row bot";
        row.id = "typing-row";
        row.innerHTML = `
            <div class="avatar bot">AI</div>
            <div class="typing-bubble">
                <span></span><span></span><span></span>
            </div>`;
        chatBox.appendChild(row);
        scrollToBottom();
        return row;
    }

    function scrollToBottom() {
        const box = document.getElementById("chat-box");
        box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
    }

    function formatBotText(text) {
        // Bold: **text**
        return escapeHtml(text)
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>');
    }

    // ── INPUT HELPERS ──
    function handleKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function updateCharCount(el) {
        // optional: can add char count display if needed
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ── Enter on setup form ──
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (document.getElementById('setup-screen').style.display === 'flex') saveAndStart();
        }
    });
</script>
</body>
</html>
